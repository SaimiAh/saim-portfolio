databases:
  - name: saim-portfolio-db
    databaseName: portfolio
    user: portfolio
    plan: free

services:
  - type: web
    name: saim-portfolio
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn saim_portfolio.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: saim-portfolio-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false   # Set this manually in the Render dashboard
